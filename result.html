<!DOCTYPE html>
<html>
<head>
<title>Trip Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="container mt-4">

<h2>Trip Plan for {{ destination }}</h2>

<h4>🗺️ Itinerary</h4>
<ul>
{% for day, plan in itinerary.items() %}
<li><b>{{ day }}</b> — {{ plan }}</li>
{% endfor %}
</ul>

<h4>🛡️ Safety</h4>
<ul>
{% for k,v in safety.items() %}
<li><b>{{ k }}</b>: {{ v }}</li>
{% endfor %}
</ul>

<button onclick="loadSafety('{{ destination }}')">More Safety Details</button>

<div id="extraSafety"></div>

<iframe
  src="https://www.google.com/maps?q={{ destination }}&output=embed"
  width="100%" height="400">
</iframe>

<script>
function loadSafety(place){
  fetch(`/safety-details/${place}`)
    .then(res=>res.json())
    .then(data=>{
      let html = "<h5>Detailed Safety</h5><ul>";
      for(let k in data){ html += `<li>${k}: ${data[k]}</li>`; }
      html += "</ul>";
      document.getElementById("extraSafety").innerHTML = html;
    })
}
</script>

</body>
</html>
